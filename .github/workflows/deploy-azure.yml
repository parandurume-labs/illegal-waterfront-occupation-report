name: Build and Deploy to Azure App Service

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: illegal-occupation-report
  NODE_VERSION: '20.x'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci

      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      - name: Build client
        working-directory: ./client
        run: npx vite build

      - name: Create deployment package
        run: |
          mkdir -p deploy/client deploy/data deploy/uploads
          cp -r server deploy/
          cp -r client/dist deploy/client/dist
          cp package.json deploy/
          cp package-lock.json deploy/ 2>/dev/null || true

      - name: Install production dependencies
        working-directory: ./deploy
        run: npm ci --omit=dev

      - name: Create zip
        run: cd deploy && zip -r ../deploy.zip . -x "*.git*"

      - name: Deploy via Kudu ZIP API
        run: |
          CREDS=$(echo '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}' | grep -oP 'userName="\K[^"]+' | head -1)
          PASS=$(echo '${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}' | grep -oP 'userPWD="\K[^"]+' | head -1)
          curl -s -X POST \
            --user "$CREDS:$PASS" \
            --data-binary @deploy.zip \
            -H "Content-Type: application/zip" \
            "https://${{ env.AZURE_WEBAPP_NAME }}.scm.azurewebsites.net/api/zipdeploy?isAsync=false" \
            -w "\nHTTP Status: %{http_code}\n"

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: ${{ env.AZURE_WEBAPP_NAME }}" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
